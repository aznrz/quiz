<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="-apple-system, Segoe UI, sans-serif">
  <defs>
    <style>
      .title { font-size: 20px; font-weight: 700; fill: #1f2937; }
      .formula { font-size: 16px; font-weight: 600; fill: #374151; font-family: 'Cascadia Mono', Consolas, monospace; }
      .bin-label { font-size: 13px; font-weight: 600; fill: #ffffff; text-anchor: middle; }
      .axis { font-size: 12px; fill: #6b7280; text-anchor: middle; }
      .small { font-size: 12px; fill: #6b7280; }
      .step { font-size: 13px; fill: #1f2937; }
      .step-key { font-weight: 700; fill: #2563eb; }
    </style>
  </defs>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" class="title">Биннинг возраста: 70 лет ÷ 7 корзин = 10 лет/корзина</text>

  <!-- Formula -->
  <text x="400" y="62" text-anchor="middle" class="formula">(85 − 15) / 7 = 10 years per bin</text>

  <!-- Single rectangle showing 70-year range -->
  <text x="60" y="105" class="small">До группировки:</text>
  <rect x="60" y="115" width="680" height="36" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1"/>
  <text x="400" y="139" text-anchor="middle" font-size="14" fill="#374151" font-weight="600">Age column: 15 → 85 (70 years range)</text>

  <!-- 7 bins of 10 years each -->
  <text x="60" y="195" class="small">После Number of bins = 7:</text>

  <!-- Each bin = 680/7 ≈ 97.1 px wide -->
  <g>
    <!-- 15-25 -->
    <rect x="60"        y="205" width="97" height="50" fill="#3b82f6"/>
    <text x="108.5"     y="237" class="bin-label">15-25</text>
    <text x="108.5"     y="278" class="axis">10 лет</text>
    <!-- 25-35 -->
    <rect x="157.14"    y="205" width="97" height="50" fill="#22c55e"/>
    <text x="205.64"    y="237" class="bin-label">25-35</text>
    <text x="205.64"    y="278" class="axis">10 лет</text>
    <!-- 35-45 -->
    <rect x="254.28"    y="205" width="97" height="50" fill="#eab308"/>
    <text x="302.78"    y="237" class="bin-label">35-45</text>
    <text x="302.78"    y="278" class="axis">10 лет</text>
    <!-- 45-55 -->
    <rect x="351.42"    y="205" width="97" height="50" fill="#f97316"/>
    <text x="399.92"    y="237" class="bin-label">45-55</text>
    <text x="399.92"    y="278" class="axis">10 лет</text>
    <!-- 55-65 -->
    <rect x="448.56"    y="205" width="97" height="50" fill="#ef4444"/>
    <text x="497.06"    y="237" class="bin-label">55-65</text>
    <text x="497.06"    y="278" class="axis">10 лет</text>
    <!-- 65-75 -->
    <rect x="545.70"    y="205" width="97" height="50" fill="#a855f7"/>
    <text x="594.20"    y="237" class="bin-label">65-75</text>
    <text x="594.20"    y="278" class="axis">10 лет</text>
    <!-- 75-85 -->
    <rect x="642.84"    y="205" width="97.16" height="50" fill="#06b6d4"/>
    <text x="691.42"    y="237" class="bin-label">75-85</text>
    <text x="691.42"    y="278" class="axis">10 лет</text>
  </g>

  <!-- Steps recap -->
  <g transform="translate(60, 305)">
    <text x="0"   y="0"  class="step"><tspan class="step-key">1.</tspan> Right-click Age → New group</text>
    <text x="0"   y="20" class="step"><tspan class="step-key">2.</tspan> Group type = <tspan font-weight="700" fill="#dc2626">Bin</tspan></text>
    <text x="370" y="0"  class="step"><tspan class="step-key">3.</tspan> Bin type = <tspan font-weight="700" fill="#dc2626">Number of bins</tspan></text>
    <text x="370" y="20" class="step"><tspan class="step-key">4.</tspan> Bin count = <tspan font-weight="700" fill="#dc2626">7</tspan> → 10-year ranges</text>
  </g>

  <!-- Caveat about Bin size -->
  <text x="60" y="365" class="small" fill="#9ca3af">⚠ «Bin size = 10» дал бы тот же результат, но через другой Bin type (Size of bins, не Number).</text>
</svg>
