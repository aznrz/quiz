<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
    <linearGradient id="okBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcfce7"/>
      <stop offset="1" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="badBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fee2e2"/>
      <stop offset="1" stop-color="#fecaca"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="760" height="540" fill="#f8fafc"/>

  <!-- Title -->
  <text x="380" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">
    Scheduled Refresh — Что обновляется?
  </text>
  <text x="380" y="58" text-anchor="middle" font-size="13" fill="#475569">
    Power BI Service • Import mode • On-premises SQL Server
  </text>

  <!-- Source pipeline strip -->
  <g transform="translate(40,90)">
    <rect x="0" y="0" width="680" height="64" rx="10" fill="#fff" stroke="#cbd5e1"/>
    <!-- SQL -->
    <g transform="translate(20,12)">
      <rect width="140" height="40" rx="6" fill="#0ea5e9"/>
      <text x="70" y="25" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">SQL Server (on-prem)</text>
    </g>
    <line x1="170" y1="32" x2="220" y2="32" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
    <!-- Gateway -->
    <g transform="translate(225,12)">
      <rect width="120" height="40" rx="6" fill="#6366f1"/>
      <text x="60" y="25" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Data Gateway</text>
    </g>
    <line x1="355" y1="32" x2="405" y2="32" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
    <!-- Dataset -->
    <g transform="translate(410,12)">
      <rect width="160" height="40" rx="6" fill="#f59e0b"/>
      <text x="80" y="25" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Dataset (cloud)</text>
    </g>
    <line x1="580" y1="32" x2="630" y2="32" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
    <!-- Trigger -->
    <g transform="translate(635,12)">
      <rect width="40" height="40" rx="6" fill="#0f172a"/>
      <text x="20" y="27" text-anchor="middle" font-size="18" fill="#fff">⏰</text>
    </g>
  </g>

  <!-- LEFT: YES -->
  <g transform="translate(40,180)">
    <rect width="340" height="320" rx="14" fill="url(#okBg)" stroke="#16a34a" stroke-width="1.5"/>
    <text x="170" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">
      ✅ ОБНОВЛЯЕТСЯ при Scheduled Refresh
    </text>

    <g transform="translate(20,60)">
      <rect width="300" height="68" rx="8" fill="#fff" stroke="#86efac"/>
      <text x="14" y="24" font-size="14" font-weight="700" fill="#166534">B. Обновление данных (Data refresh)</text>
      <text x="14" y="44" font-size="12" fill="#0f172a">Данные загружаются из SQL Server</text>
      <text x="14" y="60" font-size="12" fill="#0f172a">и обновляют датасет в облаке.</text>
    </g>

    <g transform="translate(20,140)">
      <rect width="300" height="68" rx="8" fill="#fff" stroke="#86efac"/>
      <text x="14" y="24" font-size="14" font-weight="700" fill="#166534">D. Выполнение запросов (Queries)</text>
      <text x="14" y="44" font-size="12" fill="#0f172a">Запросы, заполняющие визуальные элементы,</text>
      <text x="14" y="60" font-size="12" fill="#0f172a">выполняются заново для свежих данных.</text>
    </g>

    <g transform="translate(20,220)">
      <rect width="300" height="80" rx="8" fill="#fff" stroke="#86efac"/>
      <text x="14" y="24" font-size="14" font-weight="700" fill="#166534">Дополнительно: Schema refresh</text>
      <text x="14" y="44" font-size="12" fill="#0f172a">Если структура таблиц источника изменилась</text>
      <text x="14" y="60" font-size="12" fill="#0f172a">(типы данных, новые столбцы), это также</text>
      <text x="14" y="74" font-size="12" fill="#0f172a">отражается при полном обновлении.</text>
    </g>
  </g>

  <!-- RIGHT: NO -->
  <g transform="translate(380,180)">
    <rect width="340" height="320" rx="14" fill="url(#badBg)" stroke="#dc2626" stroke-width="1.5"/>
    <text x="170" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#7f1d1d">
      ❌ НЕ ОБНОВЛЯЕТСЯ автоматически
    </text>

    <g transform="translate(20,60)">
      <rect width="300" height="80" rx="8" fill="#fff" stroke="#fca5a5"/>
      <text x="14" y="24" font-size="14" font-weight="700" fill="#991b1b">C. Визуалы отчета (Report visuals)</text>
      <text x="14" y="44" font-size="12" fill="#0f172a">Открытые браузерные сессии отчетов</text>
      <text x="14" y="60" font-size="12" fill="#0f172a">не обновляются сами. Пользователь должен</text>
      <text x="14" y="74" font-size="12" fill="#0f172a">вручную нажать кнопку &quot;Обновить&quot;.</text>
    </g>

    <g transform="translate(20,150)">
      <rect width="300" height="80" rx="8" fill="#fff" stroke="#fca5a5"/>
      <text x="14" y="24" font-size="14" font-weight="700" fill="#991b1b">A. Кэш запросов (Query caches)</text>
      <text x="14" y="44" font-size="12" fill="#0f172a">Кэш запросов — функция Premium-емкости.</text>
      <text x="14" y="60" font-size="12" fill="#0f172a">Она не сбрасывается обычным</text>
      <text x="14" y="74" font-size="12" fill="#0f172a">запланированным обновлением Import-модели.</text>
    </g>

    <g transform="translate(20,240)">
      <rect width="300" height="60" rx="8" fill="#fff" stroke="#fca5a5"/>
      <text x="14" y="24" font-size="14" font-weight="700" fill="#991b1b">Плитки дашбордов (Dashboard tiles)</text>
      <text x="14" y="44" font-size="12" fill="#0f172a">Кэш плиток дашбора обновляется</text>
      <text x="14" y="56" font-size="12" fill="#0f172a">по отдельному правилу (раз в час).</text>
    </g>
  </g>

  <text x="380" y="528" text-anchor="middle" font-size="11" fill="#64748b">
    Правильный выбор: B (Queries refreshed) + D (Schema changes shown)
  </text>
</svg>