<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="okBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcfce7"/>
      <stop offset="1" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="badBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fee2e2"/>
      <stop offset="1" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <rect width="760" height="540" fill="#f8fafc"/>

  <!-- Header -->
  <rect x="40" y="24" width="680" height="68" rx="12" fill="url(#hdr)"/>
  <text x="380" y="56" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">
    Зачем бизнесу понимать технические основы Generative AI?
  </text>
  <text x="380" y="78" text-anchor="middle" font-size="12" fill="#e0e7ff">
    Контекст: интеграция GenAI в производственный процесс (использование, а не разработка)
  </text>

  <!-- A: ✅ -->
  <g transform="translate(40,112)">
    <rect width="340" height="184" rx="14" fill="url(#okBg)" stroke="#16a34a" stroke-width="1.5"/>
    <circle cx="32" cy="32" r="18" fill="#16a34a"/>
    <text x="32" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">A</text>
    <text x="62" y="38" font-size="15" font-weight="700" fill="#14532d">✅ Productivity + Customer engagement</text>

    <text x="20" y="78" font-size="13" fill="#0f172a">Понимание ограничений и сильных сторон</text>
    <text x="20" y="96" font-size="13" fill="#0f172a">модели → правильный выбор задач для</text>
    <text x="20" y="114" font-size="13" fill="#0f172a">автоматизации, корректные промпты,</text>
    <text x="20" y="132" font-size="13" fill="#0f172a">меньше «галлюцинаций» в общении</text>
    <text x="20" y="150" font-size="13" fill="#0f172a">с клиентом → выше производительность</text>
    <text x="20" y="168" font-size="13" fill="#0f172a">и качество взаимодействия.</text>
  </g>

  <!-- C: ✅ -->
  <g transform="translate(380,112)">
    <rect width="340" height="184" rx="14" fill="url(#okBg)" stroke="#16a34a" stroke-width="1.5"/>
    <circle cx="32" cy="32" r="18" fill="#16a34a"/>
    <text x="32" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">C</text>
    <text x="62" y="38" font-size="15" font-weight="700" fill="#14532d">✅ Optimal decision-making</text>

    <text x="20" y="78" font-size="13" fill="#0f172a">Зная как работают LLM, понимаешь</text>
    <text x="20" y="96" font-size="13" fill="#0f172a">когда им доверять, а когда нужна</text>
    <text x="20" y="114" font-size="13" fill="#0f172a">проверка человеком (HITL). Это влияет</text>
    <text x="20" y="132" font-size="13" fill="#0f172a">на выбор модели, оценку рисков</text>
    <text x="20" y="150" font-size="13" fill="#0f172a">и интеграцию в бизнес-процессы —</text>
    <text x="20" y="168" font-size="13" fill="#0f172a">основа более качественных решений.</text>
  </g>

  <!-- B: ❌ -->
  <g transform="translate(40,308)">
    <rect width="340" height="200" rx="14" fill="url(#badBg)" stroke="#dc2626" stroke-width="1.5"/>
    <circle cx="32" cy="32" r="18" fill="#dc2626"/>
    <text x="32" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">B</text>
    <text x="62" y="38" font-size="15" font-weight="700" fill="#7f1d1d">❌ Compliance with data standards</text>

    <text x="20" y="78" font-size="13" fill="#0f172a">Compliance важна, но это вопрос</text>
    <text x="20" y="96" font-size="13" fill="#0f172a">правовой и data governance, а не</text>
    <text x="20" y="114" font-size="13" fill="#0f172a">технических основ GenAI как таковых.</text>
    <text x="20" y="138" font-size="12" font-style="italic" fill="#475569">Compliance решается политиками,</text>
    <text x="20" y="154" font-size="12" font-style="italic" fill="#475569">аудитом и DPA — её не получают</text>
    <text x="20" y="170" font-size="12" font-style="italic" fill="#475569">«через понимание архитектуры</text>
    <text x="20" y="186" font-size="12" font-style="italic" fill="#475569">трансформеров».</text>
  </g>

  <!-- D: ❌ -->
  <g transform="translate(380,308)">
    <rect width="340" height="200" rx="14" fill="url(#badBg)" stroke="#dc2626" stroke-width="1.5"/>
    <circle cx="32" cy="32" r="18" fill="#dc2626"/>
    <text x="32" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">D</text>
    <text x="62" y="38" font-size="15" font-weight="700" fill="#7f1d1d">❌ Develop new software / training</text>

    <text x="20" y="78" font-size="13" fill="#0f172a">Условие вопроса: компания</text>
    <text x="20" y="96" font-size="13" fill="#0f172a">**интегрирует** GenAI в производство,</text>
    <text x="20" y="114" font-size="13" fill="#0f172a">а не **разрабатывает** новый софт.</text>
    <text x="20" y="138" font-size="12" font-style="italic" fill="#475569">Это задача R&amp;D / vendor-команд</text>
    <text x="20" y="154" font-size="12" font-style="italic" fill="#475569">(OpenAI, Microsoft, ...), а не</text>
    <text x="20" y="170" font-size="12" font-style="italic" fill="#475569">data-аналитика, который</text>
    <text x="20" y="186" font-size="12" font-style="italic" fill="#475569">встраивает готовое решение.</text>
  </g>

  <text x="380" y="530" text-anchor="middle" font-size="11" fill="#64748b">
    Правильные ответы: A + C — направлены на использование, а не на разработку и не на регуляторику
  </text>
</svg>
