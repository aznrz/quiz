<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 440" role="img" aria-labelledby="t d">
  <title id="t">Frequency Histogram в Power BI Desktop</title>
  <desc id="d">Схема: выбор визуала Clustered column chart, группировка числового поля BasketSize через New group → Bin и итоговая гистограмма частот.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <rect width="760" height="440" fill="url(#bg)"/>

  <!-- Heading -->
  <text x="380" y="34" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">Frequency Histogram в Power BI Desktop</text>
  <text x="380" y="56" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#94a3b8">3 шага: визуал → группировка через Bin → ось X = группы, ось Y = COUNT</text>

  <!-- Panel 1: Visualizations pane -->
  <g transform="translate(28,82)">
    <rect width="200" height="320" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.5">VISUALIZATIONS PANE</text>

    <!-- chart-type icons grid 4x3 -->
    <g transform="translate(14,38)">
      <!-- row 1 -->
      <rect width="36" height="32" rx="4" fill="#0f172a" stroke="#334155"/>
      <g transform="translate(8,20)" fill="#64748b"><rect width="3" height="8"/><rect x="6" width="3" height="14"/><rect x="12" width="3" height="6"/><rect x="18" width="3" height="10"/></g>

      <rect x="44" width="36" height="32" rx="4" fill="#0f172a" stroke="#334155"/>
      <g transform="translate(52,28)" fill="#64748b"><rect width="20" height="3"/><rect y="-5" width="14" height="3"/><rect y="-10" width="8" height="3"/></g>

      <rect x="88" width="36" height="32" rx="4" fill="#0f172a" stroke="#334155"/>
      <polyline points="96,28 104,18 112,22 120,12" stroke="#64748b" stroke-width="2" fill="none"/>

      <rect x="132" width="36" height="32" rx="4" fill="#0f172a" stroke="#334155"/>
      <circle cx="150" cy="16" r="9" fill="none" stroke="#64748b" stroke-width="2"/>
      <line x1="150" y1="16" x2="158" y2="10" stroke="#64748b" stroke-width="2"/>

      <!-- row 2: Clustered column chart — SELECTED -->
      <rect y="40" width="36" height="32" rx="4" fill="#312e81" stroke="#a78bfa" stroke-width="2"/>
      <g transform="translate(6,68)" fill="#a78bfa">
        <rect width="4" height="10"/>
        <rect x="5" width="4" height="14"/>
        <rect x="12" width="4" height="8"/>
        <rect x="17" width="4" height="12"/>
        <rect x="24" width="4" height="10"/>
      </g>

      <rect x="44" y="40" width="36" height="32" rx="4" fill="#0f172a" stroke="#334155"/>
      <g transform="translate(52,68)" fill="#64748b" opacity="0.55">
        <rect width="4" height="10"/><rect x="6" width="4" height="14"/><rect x="12" width="4" height="8"/><rect x="18" width="4" height="12"/>
      </g>

      <rect x="88" y="40" width="36" height="32" rx="4" fill="#0f172a" stroke="#334155"/>
      <g transform="translate(96,68)" fill="#64748b" opacity="0.55">
        <rect width="20" height="3"/><rect y="-5" width="14" height="3"/>
      </g>

      <rect x="132" y="40" width="36" height="32" rx="4" fill="#0f172a" stroke="#334155"/>
      <g transform="translate(140,52)" fill="#64748b" opacity="0.55"><circle r="9" fill="none" stroke="#64748b" stroke-width="2"/></g>

      <!-- row 3 -->
      <rect y="80" width="36" height="32" rx="4" fill="#0f172a" stroke="#334155"/>
      <text x="18" y="100" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Map</text>
      <rect x="44" y="80" width="36" height="32" rx="4" fill="#0f172a" stroke="#334155"/>
      <text x="62" y="100" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">KPI</text>
      <rect x="88" y="80" width="36" height="32" rx="4" fill="#0f172a" stroke="#334155"/>
      <text x="106" y="100" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Slicer</text>
      <rect x="132" y="80" width="36" height="32" rx="4" fill="#0f172a" stroke="#334155"/>
      <text x="150" y="100" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Card</text>
    </g>

    <!-- Selected label -->
    <text x="14" y="184" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#a78bfa">► Clustered column chart</text>
    <text x="14" y="201" font-family="Inter, sans-serif" font-size="10" fill="#64748b">(не «Histogram» — такого встро-</text>
    <text x="14" y="214" font-family="Inter, sans-serif" font-size="10" fill="#64748b">енного визуала нет)</text>

    <!-- Field wells -->
    <text x="14" y="240" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#94a3b8">X-axis</text>
    <rect x="14" y="246" width="172" height="22" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="22" y="261" font-family="ui-monospace, monospace" font-size="10" fill="#22d3ee">BasketSize (Bin)</text>

    <text x="14" y="284" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#94a3b8">Y-axis</text>
    <rect x="14" y="290" width="172" height="22" rx="4" fill="#0f172a" stroke="#334155"/>
    <text x="22" y="305" font-family="ui-monospace, monospace" font-size="10" fill="#cbd5e1">Count of OrderID</text>
  </g>

  <!-- Arrow 1 -->
  <g stroke="#475569" stroke-width="2" fill="none">
    <line x1="232" y1="244" x2="282" y2="244"/>
    <polygon points="282,238 294,244 282,250" fill="#475569" stroke="none"/>
  </g>

  <!-- Panel 2: New group → Bin -->
  <g transform="translate(296,82)">
    <rect width="220" height="320" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.5">RIGHT-CLICK ON FIELD</text>

    <!-- Field listing -->
    <g transform="translate(14,34)">
      <rect width="192" height="20" rx="3" fill="#0f172a"/>
      <text x="8" y="14" font-family="ui-monospace, monospace" font-size="10" fill="#cbd5e1">OrderID</text>

      <rect y="24" width="192" height="20" rx="3" fill="#0f172a"/>
      <text x="8" y="38" font-family="ui-monospace, monospace" font-size="10" fill="#cbd5e1">CustomerID</text>

      <rect y="48" width="192" height="20" rx="3" fill="#312e81" stroke="#a78bfa"/>
      <text x="8" y="62" font-family="ui-monospace, monospace" font-size="10" fill="#a78bfa">BasketSize</text>
    </g>

    <!-- Context menu mock -->
    <g transform="translate(58,116)">
      <rect width="170" height="120" rx="6" fill="#0f172a" stroke="#475569" filter="url(#glow)" opacity="0.95"/>
      <rect width="170" height="120" rx="6" fill="#0f172a" stroke="#475569"/>
      <text x="12" y="22" font-family="Inter, sans-serif" font-size="11" fill="#cbd5e1">Rename</text>
      <line x1="8" y1="32" x2="162" y2="32" stroke="#334155"/>
      <text x="12" y="48" font-family="Inter, sans-serif" font-size="11" fill="#cbd5e1">Hide</text>
      <line x1="8" y1="58" x2="162" y2="58" stroke="#334155"/>
      <rect x="4" y="64" width="162" height="22" rx="3" fill="#312e81"/>
      <text x="12" y="79" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#a78bfa">► New group…</text>
      <line x1="8" y1="90" x2="162" y2="90" stroke="#334155"/>
      <text x="12" y="106" font-family="Inter, sans-serif" font-size="11" fill="#cbd5e1">New measure</text>
    </g>

    <!-- Dialog hint -->
    <g transform="translate(14,256)">
      <rect width="192" height="52" rx="6" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="10" y="18" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#22d3ee">Group type: Bin</text>
      <text x="10" y="34" font-family="ui-monospace, monospace" font-size="10" fill="#cbd5e1">Min: 1   Max: 25   Size: 5</text>
      <text x="10" y="46" font-family="Inter, sans-serif" font-size="9" fill="#64748b">→ groups [1–5][6–10][11–15]…</text>
    </g>
  </g>

  <!-- Arrow 2 -->
  <g stroke="#475569" stroke-width="2" fill="none">
    <line x1="520" y1="244" x2="570" y2="244"/>
    <polygon points="570,238 582,244 570,250" fill="#475569" stroke="none"/>
  </g>

  <!-- Panel 3: Resulting histogram -->
  <g transform="translate(586,82)">
    <rect width="146" height="320" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.5">RESULT</text>
    <text x="14" y="40" font-family="Inter, sans-serif" font-size="10" fill="#cbd5e1">Count of OrderID by</text>
    <text x="14" y="54" font-family="Inter, sans-serif" font-size="10" fill="#cbd5e1">BasketSize (Bin)</text>

    <!-- bars -->
    <g transform="translate(20,210)">
      <rect x="0"  y="-22" width="18" height="22" fill="url(#bar)" rx="2"/>
      <rect x="22" y="-58" width="18" height="58" fill="url(#bar)" rx="2"/>
      <rect x="44" y="-92" width="18" height="92" fill="url(#bar)" rx="2"/>
      <rect x="66" y="-72" width="18" height="72" fill="url(#bar)" rx="2"/>
      <rect x="88" y="-38" width="18" height="38" fill="url(#bar)" rx="2"/>
      <line x1="-4" y1="0" x2="112" y2="0" stroke="#334155"/>
    </g>

    <!-- x-axis labels -->
    <g font-family="ui-monospace, monospace" font-size="8" fill="#94a3b8" transform="translate(20,224)">
      <text x="9"   text-anchor="middle">1–5</text>
      <text x="31"  text-anchor="middle">6–10</text>
      <text x="53"  text-anchor="middle">11–15</text>
      <text x="75"  text-anchor="middle">16–20</text>
      <text x="97"  text-anchor="middle">21–25</text>
    </g>

    <text x="73" y="262" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#64748b">BasketSize (Bin)</text>

    <!-- caption -->
    <text x="14" y="290" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#22c55e">Frequency Histogram ✓</text>
    <text x="14" y="304" font-family="Inter, sans-serif" font-size="9" fill="#64748b">Clustered column chart</text>
    <text x="14" y="315" font-family="Inter, sans-serif" font-size="9" fill="#64748b">+ Bin grouping</text>
  </g>

  <!-- Footer formula -->
  <text x="380" y="426" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#a78bfa">
    Histogram = Clustered column chart + (Numeric field → New group → Bin) on X-axis
  </text>
</svg>
